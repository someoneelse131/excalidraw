services:
  excalidraw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_APP_WS_SERVER_URL=wss://excalidraw-ws.kirby.rocks
        - VITE_APP_DISABLE_TRACKING=true
    container_name: excalidraw
    restart: unless-stopped
    ports:
      - "${EXCALIDRAW_PORT:-41006}:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  excalidraw-room:
    image: excalidraw/excalidraw-room:latest
    container_name: excalidraw-room
    restart: unless-stopped
    ports:
      - "${EXCALIDRAW_COLLAB_PORT:-41007}:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
